<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- Background -->
  <rect width="1200" height="675" fill="#0a0a0f"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#grid)"/>
  
  <!-- Header -->
  <text x="600" y="80" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" letter-spacing="3">VERIFICATION REPORT</text>
  <text x="600" y="110" text-anchor="middle" fill="#6a6a7e" font-family="system-ui, sans-serif" font-size="14">AI-POWERED DOCUMENT ANALYSIS • CASE #ABJ-2026-0314</text>
  
  <!-- Main report card -->
  <rect x="150" y="150" width="900" height="400" rx="12" fill="#12121a" stroke="#2a2a3e" stroke-width="2"/>
  
  <!-- Status badge -->
  <rect x="850" y="170" width="180" height="40" rx="20" fill="#ff4444" opacity="0.2"/>
  <rect x="850" y="170" width="180" height="40" rx="20" fill="none" stroke="#ff4444" stroke-width="2"/>
  <text x="940" y="197" text-anchor="middle" fill="#ff4444" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">⚠️ DISCREPANCY DETECTED</text>
  
  <!-- Document fields -->
  <text x="200" y="200" fill="#6a6a7e" font-family="system-ui, sans-serif" font-size="12">PROPERTY LOCATION</text>
  <text x="200" y="225" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Wuse II, Abuja</text>
  
  <text x="200" y="270" fill="#6a6a7e" font-family="system-ui, sans-serif" font-size="12">TITLE DOCUMENT</text>
  <text x="200" y="295" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Certificate of Occupancy</text>
  <text x="200" y="315" fill="#4ade80" font-family="system-ui, sans-serif" font-size="14">✓ Valid</text>
  
  <text x="200" y="360" fill="#6a6a7e" font-family="system-ui, sans-serif" font-size="12">SURVEY PLAN</text>
  <text x="200" y="385" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Survey Plan #AB-78432</text>
  <text x="200" y="405" fill="#ff4444" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">✗ BEACON MISMATCH</text>
  
  <!-- AI Analysis box -->
  <rect x="550" y="250" width="500" height="280" rx="8" fill="#0d1117" stroke="#00d4ff" stroke-width="1"/>
  <text x="570" y="280" fill="#00d4ff" font-family="monospace, sans-serif" font-size="12">> AI ANALYSIS</text>
  
  <text x="570" y="310" fill="#6a6a7e" font-family="monospace, sans-serif" font-size="11">Comparing survey coordinates...</text>
  <text x="570" y="335" fill="#6a6a7e" font-family="monospace, sans-serif" font-size="11">Beacon 1: Expected 9.0762°N, 7.3985°E</text>
  <text x="570" y="355" fill="#ff4444" font-family="monospace, sans-serif" font-size="11">Beacon 1: Actual   9.0789°N, 7.4012°E</text>
  
  <text x="570" y="390" fill="#ff4444" font-family="monospace, sans-serif" font-size="12" font-weight="bold">> DISCREPANCY: 312 METERS</text>
  
  <text x="570" y="425" fill="#6a6a7e" font-family="monospace, sans-serif" font-size="11">Human review: PASSED</text>
  <text x="570" y="445" fill="#4ade80" font-family="monospace, sans-serif" font-size="11" font-weight="bold">AI detection: FLAGGED ⚠️</text>
  
  <text x="570" y="490" fill="#00d4ff" font-family="monospace, sans-serif" font-size="12" font-weight="bold">> BUYER SAVED: ₦45,000,000</text>
  
  <!-- Footer -->
  <text x="600" y="600" text-anchor="middle" fill="#4a4a5e" font-family="system-ui, sans-serif" font-size="14">This is what real AI verification looks like. Not chatbots. Detection.</text>
  
  <!-- Decorative -->
  <circle cx="100" cy="100" r="60" fill="url(#glow)"/>
  <circle cx="1100" cy="575" r="40" fill="url(#glow)"/>
</svg>